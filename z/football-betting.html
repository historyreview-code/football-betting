<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>足球投注自动清算系统</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --danger-color: #e74c3c;
            --warning-color: #f39c12;
            --bg-color: #ecf0f1;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-color: #bdc3c7;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-color);
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }
        
        .card h2 {
            margin-bottom: 15px;
            color: var(--primary-color);
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input, select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
        }
        
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #34495e;
        }
        
        button.accent {
            background-color: var(--accent-color);
        }
        
        button.accent:hover {
            background-color: #2ecc71;
        }
        
        button.danger {
            background-color: var(--danger-color);
        }
        
        button.danger:hover {
            background-color: #c0392b;
        }
        
        button.warning {
            background-color: var(--warning-color);
        }
        
        button.warning:hover {
            background-color: #d35400;
        }
        
        .list {
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
        }
        
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        
        .list-item:last-child {
            border-bottom: none;
        }
        
        .list-item button {
            padding: 4px 8px;
            font-size: 12px;
        }
        
        .bet-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .bet-form .full-width {
            grid-column: 1 / -1;
        }
        
        .radio-group {
            display: flex;
            gap: 15px;
        }
        
        .radio-group label {
            display: flex;
            align-items: center;
            font-weight: normal;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background-color: var(--primary-color);
            color: white;
            font-weight: bold;
        }
        
        tr:hover {
            background-color: #f5f5f5;
        }
        
        .status-pending {
            color: var(--warning-color);
            font-weight: bold;
        }
        
        .status-win {
            color: var(--accent-color);
            font-weight: bold;
        }
        
        .status-lose {
            color: var(--danger-color);
            font-weight: bold;
        }
        
        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .notification {
            padding: 15px;
            margin: 15px 0;
            border-radius: 4px;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: none;
        }
        
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--primary-color);
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            background: #eee;
            border: 1px solid var(--border-color);
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            margin-right: 5px;
        }
        
        .tab.active {
            background: var(--primary-color);
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .odds-inputs {
            display: flex;
            gap: 10px;
        }
        
        .odds-inputs input {
            width: 60px;
        }
        
        .odds-inputs label {
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚽ 足球投注自动清算系统</h1>
            <p>管理参与者、比赛、投注记录，并自动计算盈亏</p>
        </header>
        
        <div class="dashboard">
            <!-- 参与者管理 -->
            <div class="card">
                <h2>👥 参与者管理</h2>
                <div class="form-group">
                    <label for="participantName">参与者姓名</label>
                    <input type="text" id="participantName" placeholder="输入姓名">
                    <button onclick="addParticipant()" style="width: 100%; margin-top: 10px;">添加参与者</button>
                </div>
                <div class="list" id="participantsList"></div>
            </div>
            
            <!-- 比赛管理 -->
            <div class="card">
                <h2>🏆 比赛管理</h2>
                <div class="form-group">
                    <label for="matchName">比赛名称 (例如: A队 vs B队)</label>
                    <input type="text" id="matchName" placeholder="输入比赛名称">
                    <div class="odds-inputs" style="margin-top: 10px;">
                        <div>
                            <label>胜赔率</label>
                            <input type="number" id="oddsWin" step="0.01" value="2.00">
                        </div>
                        <div>
                            <label>平赔率</label>
                            <input type="number" id="oddsDraw" step="0.01" value="3.00">
                        </div>
                        <div>
                            <label>负赔率</label>
                            <input type="number" id="oddsLose" step="0.01" value="3.50">
                        </div>
                    </div>
                    <button onclick="addMatch()" style="width: 100%; margin-top: 10px;">添加比赛</button>
                </div>
                <div class="list" id="matchesList"></div>
            </div>
            
            <!-- 投注录入 -->
            <div class="card">
                <h2>📝 投注录入</h2>
                <div class="bet-form">
                    <div class="form-group">
                        <label for="betParticipant">参与者</label>
                        <select id="betParticipant"></select>
                    </div>
                    <div class="form-group">
                        <label for="betMatch">比赛</label>
                        <select id="betMatch"></select>
                    </div>
                    <div class="form-group full-width">
                        <label>投注结果</label>
                        <div class="radio-group">
                            <label><input type="radio" name="betType" value="胜" checked> 主队胜</label>
                            <label><input type="radio" name="betType" value="平"> 平局</label>
                            <label><input type="radio" name="betType" value="负"> 主队负</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="betAmount">投注金额</label>
                        <input type="number" id="betAmount" min="1" step="1" value="100">
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        <button onclick="addBet()" style="width: 100%;">确认投注</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="notification" id="notification"></div>
        
        <div class="card" style="margin-bottom: 30px;">
            <h2>📊 投注记录</h2>
            <table>
                <thead>
                    <tr>
                        <th>参与者</th>
                        <th>比赛</th>
                        <th>投注类型</th>
                        <th>赔率</th>
                        <th>金额</th>
                        <th>潜在收益</th>
                        <th>状态</th>
                        <th>实际盈亏</th>
                    </tr>
                </thead>
                <tbody id="betsTableBody"></tbody>
            </table>
        </div>
        
        <div class="card">
            <div class="actions">
                <h2 style="flex-grow: 1; margin: 0; padding-top: 10px;">💰 清算结果</h2>
                <button class="warning" onclick="confirmResults()">确认比赛结果 & 清算</button>
                <button class="accent" onclick="calculateResults()">重新计算盈亏</button>
                <button class="danger" onclick="resetSystem()">重置系统</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>参与者</th>
                        <th>总投注额</th>
                        <th>中奖金额</th>
                        <th>净盈亏</th>
                        <th>盈亏系数</th>
                    </tr>
                </thead>
                <tbody id="resultsTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // 全局状态管理
        // 从 localStorage 加载状态
        function loadState() {
            try {
                const saved = localStorage.getItem('fb_betting_v2');
                if (saved) return JSON.parse(saved);
            } catch(e) {}
            return null;
        }
        function saveState() {
            localStorage.setItem('fb_betting_v2', JSON.stringify(state));
        }

        let state = loadState() || {
            participants: [],
            matches: [],
            bets: [],
            nextPId: 1,
            nextMId: 1,
            nextBId: 1
        };

        // 通知系统
        function showNotification(msg, type = 'success') {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.style.display = 'block';
            if (type === 'error') {
                notif.style.backgroundColor = '#f8d7da';
                notif.style.color = '#721c24';
                notif.style.borderColor = '#f5c6cb';
            } else {
                notif.style.backgroundColor = '#d4edda';
                notif.style.color = '#155724';
                notif.style.borderColor = '#c3e6cb';
            }
            setTimeout(() => { notif.style.display = 'none'; }, 3000);
        }

        // --- 参与者管理 ---
        function addParticipant() {
            const nameInput = document.getElementById('participantName');
            const name = nameInput.value.trim();
            if (!name) {
                showNotification("请输入参与者姓名", "error");
                return;
            }
            state.participants.push({ id: state.nextPId++, name });
            nameInput.value = '';
            saveState();
            renderAll();
            showNotification(`参与者 ${name} 添加成功`);
        }

        function deleteParticipant(id) {
            state.participants = state.participants.filter(p => p.id !== id);
            state.bets = state.bets.filter(b => b.pId !== id); // 同时删除相关投注
            renderAll();
        }

        // --- 比赛管理 ---
        function addMatch() {
            const nameInput = document.getElementById('matchName');
            const name = nameInput.value.trim();
            if (!name) {
                showNotification("请输入比赛名称", "error");
                return;
            }
            const win = parseFloat(document.getElementById('oddsWin').value) || 2.0;
            const draw = parseFloat(document.getElementById('oddsDraw').value) || 3.0;
            const lose = parseFloat(document.getElementById('oddsLose').value) || 3.5;
            
            state.matches.push({ 
                id: state.nextMId++, 
                name, 
                odds: { '胜': win, '平': draw, '负': lose },
                result: null // null表示未结算, '胜'/'平'/'负'表示结果
            });
            nameInput.value = '';
            saveState();
            renderAll();
            showNotification(`比赛 ${name} 添加成功`);
        }

        function deleteMatch(id) {
            state.matches = state.matches.filter(m => m.id !== id);
            state.bets = state.bets.filter(b => b.mId !== id);
            renderAll();
        }

        function setMatchResult(id, result) {
            const match = state.matches.find(m => m.id === id);
            if (match) {
                match.result = result;
                saveState();
                renderAll();
            }
        }

        // --- 投注管理 ---
        function addBet() {
            const pId = parseInt(document.getElementById('betParticipant').value);
            const mId = parseInt(document.getElementById('betMatch').value);
            const type = document.querySelector('input[name="betType"]:checked').value;
            const amount = parseFloat(document.getElementById('betAmount').value);

            if (!pId || !mId || !amount || amount <= 0) {
                showNotification("请填写完整的投注信息", "error");
                return;
            }

            state.bets.push({
                id: state.nextBId++,
                pId,
                mId,
                type,
                amount
            });
            renderAll();
            showNotification("投注成功");
        }

        function deleteBet(id) {
            state.bets = state.bets.filter(b => b.id !== id);
            renderAll();
        }

        // --- 清算逻辑 ---
        function confirmResults() {
            const unresolved = state.matches.filter(m => m.result === null);
            if (unresolved.length > 0) {
                showNotification(`还有 ${unresolved.length} 场比赛未确认结果`, "error");
                return;
            }
            calculateResults();
            showNotification("清算完成！请查看下方结果");
        }

        function calculateResults() {
            // 渲染投注状态表
            renderBetsTable();
            // 渲染盈亏汇总表
            renderResultsTable();
        }

        // --- 渲染逻辑 ---
        function renderAll() {
            renderParticipants();
            renderMatches();
            renderBetSelectors();
            renderBetsTable();
            renderResultsTable();
        }

        function renderParticipants() {
            const list = document.getElementById('participantsList');
            list.innerHTML = state.participants.map(p => `
                <div class="list-item">
                    <span>${p.name}</span>
                    <button class="danger" onclick="deleteParticipant(${p.id})">删除</button>
                </div>
            `).join('') || '<div style="color:#999;text-align:center;">暂无参与者</div>';
        }

        function renderMatches() {
            const list = document.getElementById('matchesList');
            list.innerHTML = state.matches.map(m => `
                <div class="list-item" style="flex-direction: column; align-items: stretch;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <strong>${m.name}</strong>
                        <button class="danger" onclick="deleteMatch(${m.id})">删除</button>
                    </div>
                    <div style="font-size:12px; color:#666;">赔率 - 胜:${m.odds['胜']} 平:${m.odds['平']} 负:${m.odds['负']}</div>
                    <div style="display:flex; gap:5px; margin-top:8px;">
                        <button onclick="setMatchResult(${m.id}, '胜')" style="background:${m.result==='胜'?'#27ae60':'#95a5a6'}; padding:4px 8px; font-size:12px;">主胜</button>
                        <button onclick="setMatchResult(${m.id}, '平')" style="background:${m.result==='平'?'#27ae60':'#95a5a6'}; padding:4px 8px; font-size:12px;">平局</button>
                        <button onclick="setMatchResult(${m.id}, '负')" style="background:${m.result==='负'?'#27ae60':'#95a5a6'}; padding:4px 8px; font-size:12px;">主负</button>
                    </div>
                </div>
            `).join('') || '<div style="color:#999;text-align:center;">暂无比赛</div>';
        }

        function renderBetSelectors() {
            const pSelect = document.getElementById('betParticipant');
            const mSelect = document.getElementById('betMatch');
            
            pSelect.innerHTML = state.participants.map(p => 
                `<option value="${p.id}">${p.name}</option>`
            ).join('') || '<option value="">请先添加参与者</option>';
            
            mSelect.innerHTML = state.matches.map(m => 
                `<option value="${m.id}">${m.name}</option>`
            ).join('') || '<option value="">请先添加比赛</option>';
        }

        function renderBetsTable() {
            const tbody = document.getElementById('betsTableBody');
            if (state.bets.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#999;">暂无投注记录</td></tr>';
                return;
            }

            tbody.innerHTML = state.bets.map(bet => {
                const p = state.participants.find(p => p.id === bet.pId);
                const m = state.matches.find(m => m.id === bet.mId);
                if (!p || !m) return ''; 
                
                const odds = m.odds[bet.type];
                const potentialWin = (bet.amount * odds).toFixed(2);
                let statusText = '待定';
                let statusClass = 'status-pending';
                let actualProfit = '0.00';
                
                if (m.result) {
                    if (m.result === bet.type) {
                        statusText = '中奖';
                        statusClass = 'status-win';
                        actualProfit = (bet.amount * odds - bet.amount).toFixed(2);
                    } else {
                        statusText = '未中';
                        statusClass = 'status-lose';
                        actualProfit = (-bet.amount).toFixed(2);
                    }
                }
                
                return `
                    <tr>
                        <td>${p.name}</td>
                        <td>${m.name}</td>
                        <td>${bet.type}</td>
                        <td>${odds}</td>
                        <td>¥${bet.amount.toFixed(2)}</td>
                        <td>¥${potentialWin}</td>
                        <td class="${statusClass}">${statusText}</td>
                        <td style="color: ${actualProfit >= 0 ? 'green' : 'red'};">${actualProfit >= 0 ? '+' : ''}¥${actualProfit}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderResultsTable() {
            const tbody = document.getElementById('resultsTableBody');
            if (state.participants.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#999;">暂无参与者数据</td></tr>';
                return;
            }

            let results = state.participants.map(p => {
                let totalBet = 0;
                let totalWin = 0;
                let hasPending = false;
                
                // 收集该参与者的所有投注
                const playerBets = state.bets.filter(b => b.pId === p.id);
                playerBets.forEach(bet => {
                    totalBet += bet.amount;
                });
                // 按比赛维度计算盈亏系数（输池按比例分配给赢家）
                const matchGroups = {};
                playerBets.forEach(bet => {
                    const m = state.matches.find(m => m.id === bet.mId);
                    if (!m || !m.result) { hasPending = true; return; }
                    if (!matchGroups[bet.mId]) matchGroups[bet.mId] = [];
                    matchGroups[bet.mId].push(bet);
                });
                for (const [mid, bets] of Object.entries(matchGroups)) {
                    const m = state.matches.find(x => x.id === parseInt(mid));
                    if (!m || !m.result) continue;
                    // 计算该比赛各选项总下注
                    const pools = { '胜': 0, '平': 0, '负': 0 };
                    const allBets = state.bets.filter(b => b.mId === parseInt(mid));
                    allBets.forEach(b => pools[b.type] += b.amount);
                    const totalPool = pools['胜'] + pools['平'] + pools['负'];
                    if (totalPool === 0) continue;
                    const winPool = pools[m.result];
                    const lossPool = totalPool - winPool;
                    // 该玩家的中注
                    const pWinBets = bets.filter(b => b.type === m.result);
                    const pWinAmt = pWinBets.reduce((s, b) => s + b.amount, 0);
                    // 赢回金额 = 中注本金 + 按比例瓜分输池
                    let winBack = pWinAmt;
                    if (pWinAmt > 0 && winPool > 0) {
                        winBack += (pWinAmt / winPool) * lossPool;
                    }
                    totalWin += winBack;
                }
                
                const netProfit = totalWin - totalBet;
                const coefficient = totalBet > 0 ? (netProfit / totalBet) : 0;
                
                return {
                    name: p.name,
                    totalBet,
                    totalWin,
                    netProfit,
                    coefficient,
                    hasPending
                };
            });

            // 按净盈亏排序
            results.sort((a, b) => b.netProfit - a.netProfit);
            
            tbody.innerHTML = results.map((r, index) => {
                const profitColor = r.netProfit >= 0 ? 'green' : 'red';
                const profitText = r.netProfit >= 0 ? `+¥${r.netProfit.toFixed(2)}` : `-¥${Math.abs(r.netProfit).toFixed(2)}`;
                return `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${r.name}</td>
                        <td>¥${r.totalBet.toFixed(2)}</td>
                        <td>¥${r.totalWin.toFixed(2)}</td>
                        <td style="color: ${profitColor}; font-weight:bold;">${profitText}</td>
                        <td style="color: ${profitColor};">${r.hasPending ? '待定' : (r.coefficient >= 0 ? '+' : '') + r.coefficient.toFixed(4)}</td>
                    </tr>
                `;
            }).join('');
        }

        function resetSystem() {
            if(confirm("确定要重置系统吗？所有数据将被清空。")) {
                state = {
                    participants: [],
                    matches: [],
                    bets: [],
                    nextPId: 1,
                    nextMId: 1,
                    nextBId: 1
                };
                saveState();
                renderAll();
                showNotification("系统已重置");
            }
        }

        // 初始化
        renderAll();
    </script>
</body>
</html>
